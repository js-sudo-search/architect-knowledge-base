<h1>NFR Checklist</h1>
<ul>
<li>Did I describe quality attributes instead of components?</li>
<li>Did I avoid databases, caches and load balancers?</li>
<li>Did I avoid QPS, bandwidth and headroom?</li>
<li>Can every NFR be expressed as 'How well should the system perform this function?'</li>
</ul>
</body></html>
